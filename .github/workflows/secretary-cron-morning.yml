name: Secretary Morning Cron

on:
  schedule:
    - cron: '35 15 * * *' # 07:35 PST
    - cron: '5 16 * * *' # 08:05 PST
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger morning gate
        env:
          BASE_URL: ${{ secrets.SECRETARY_BASE_URL }}
          CRON_SECRET: ${{ secrets.SECRETARY_CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "SECRETARY_BASE_URL is missing"
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST "$BASE_URL/api/jobs/morning" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
