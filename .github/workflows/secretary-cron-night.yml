name: Secretary Night Cron

on:
  schedule:
    - cron: '30,45 5 * * *' # 21:30, 21:45 PST
    - cron: '0,15,30 6 * * *' # 22:00, 22:15, 22:30 PST
  workflow_dispatch:

jobs:
  night:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger night gate
        env:
          BASE_URL: ${{ secrets.SECRETARY_BASE_URL }}
          CRON_SECRET: ${{ secrets.SECRETARY_CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "SECRETARY_BASE_URL is missing"
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST "$BASE_URL/api/jobs/night" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
