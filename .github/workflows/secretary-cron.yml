name: Secretary Cron Jobs

on:
  schedule:
    - cron: '*/15 * * * *'   # 15-minute trigger for morning/night window checks
  workflow_dispatch:

jobs:
  morning-night:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger morning gate
        env:
          BASE_URL: ${{ secrets.SECRETARY_BASE_URL }}
          CRON_SECRET: ${{ secrets.SECRETARY_CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "SECRETARY_BASE_URL is missing"
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST "$BASE_URL/api/jobs/morning" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"

      - name: Trigger night gate
        env:
          BASE_URL: ${{ secrets.SECRETARY_BASE_URL }}
          CRON_SECRET: ${{ secrets.SECRETARY_CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$BASE_URL/api/jobs/night" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
